name: Daily Quick Brackets Cleanup
on:
  schedule:
    - cron: "30 1 * * *"  # 01:30 UTC daily
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cleanup endpoint
        run: |
          curl -fsS -X POST "${SITE_URL}/api/cron/quick-cleanup" \
            -H "Authorization: Bearer ${CRON_SECRET}"
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
