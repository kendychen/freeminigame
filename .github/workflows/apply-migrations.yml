name: Apply DB Migrations

on:
  workflow_dispatch:
    inputs:
      migration_file:
        description: "Migration SQL file (in supabase/migrations/)"
        required: false
        default: "latest"

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install postgresql-client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply latest migration
        env:
          # Use session-mode pooler (IPv4) instead of direct DB (IPv6 only)
          PGHOST: aws-0-ap-southeast-1.pooler.supabase.com
          PGPORT: 5432
          PGUSER: postgres.luzbuptumedpvgukxnhe
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGDATABASE: postgres
          PGSSLMODE: require
        run: |
          if [ "${{ inputs.migration_file }}" = "latest" ]; then
            LATEST=$(ls supabase/migrations/*.sql | sort | tail -n1)
            echo "Applying: $LATEST"
            psql -f "$LATEST"
          else
            psql -f "supabase/migrations/${{ inputs.migration_file }}"
          fi
          echo "✅ Migration applied"
