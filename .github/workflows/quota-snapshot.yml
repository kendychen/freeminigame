name: Hourly Quota Snapshot
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger snapshot endpoint
        run: |
          curl -fsS -X POST "${SITE_URL}/api/admin/internal/snapshot" \
            -H "Authorization: Bearer ${SNAPSHOT_SECRET}" || true
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          SNAPSHOT_SECRET: ${{ secrets.SNAPSHOT_SECRET }}
